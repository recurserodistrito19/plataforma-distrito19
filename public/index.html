<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educación Digital | Distrito 19</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
        .hero { background: #1e1b4b; color: white; padding: 60px 0; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">EdDigital - Distrito 19</a>
            <div id="loginContainer">
                <div id="g_id_onload"
                     data-client_id="885266347130-kcgvl03n08m2k9fnkfs0latlt6k6ufc0.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Bienvenidos a la Plataforma</h1>
    </header>

    <script>
        // --- CONFIGURACIÓN ---
        (function() {
            emailjs.init("6tlS8cKEYlITUKSaA"); 
        })();

        function handleCredentialResponse(response) {
            const datosUsuario = jwt_decode(response.credential);
            
            // Envío de correo automático
            emailjs.send("service_2okr2wr", "template_5x5uzni", {
                nombre: datosUsuario.name,
                email: datosUsuario.email,
                fecha: new Date().toLocaleString('es-AR')
            }).then(() => {
                console.log("✅ ¡Mail enviado!");
            }).catch((err) => {
                console.error("❌ Error:", err);
            });
            
            // Saludo en pantalla
            document.getElementById('loginContainer').innerHTML = 
                `<h5 class="text-white">Hola, ${datosUsuario.given_name}</h5>`;
        }
    </script>
</body>
</html>
